name: Docker Image CI

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: backend-docker-release
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.meta.outputs.should_deploy }}
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version & decide whether to deploy
        id: meta
        run: |
          VERSION=$(grep -oP 'version\s*=\s*"\K[^"]+' build.gradle.kts | head -n1)
          TAG="v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch — deploying $TAG regardless of existing tag."
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          elif git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::notice::$TAG already exists — version unchanged, skipping deploy."
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version $TAG — will deploy."
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check
    if: needs.check.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Gradle build
        run: ./gradlew clean build --no-daemon

      - name: List subprojects
        run: ./gradlew projects

      - name: Build and push images
        env:
          VERSION: ${{ needs.check.outputs.version }}
        run: |
          for project in $(find . -name Dockerfile -exec dirname {} \;); do
            project=$(basename $project)
            echo "Building Docker image for $project..."
            docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/expenses-tracker-$project:${VERSION} $project
            docker push ${{ secrets.DOCKERHUB_USERNAME }}/expenses-tracker-$project:${VERSION}
            docker tag ${{ secrets.DOCKERHUB_USERNAME }}/expenses-tracker-$project:${VERSION} ${{ secrets.DOCKERHUB_USERNAME }}/expenses-tracker-$project:latest
            docker push ${{ secrets.DOCKERHUB_USERNAME }}/expenses-tracker-$project:latest
          done

      - name: Tag version & create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git rev-parse "refs/tags/${{ needs.check.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ needs.check.outputs.tag }} already exists — skipping release."
          else
            gh release create "${{ needs.check.outputs.tag }}" \
              --title "Release ${{ needs.check.outputs.version }}" \
              --notes "Release created automatically by GitHub Actions." \
              --target "${{ github.sha }}"
          fi
